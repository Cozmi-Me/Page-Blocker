<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>URL Blocker Settings</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      background-color: #000;
      color: #fff;
    }
    h1 {
      color: #fff;
      border-bottom: 2px solid #444;
      padding-bottom: 10px;
    }
    .section {
      margin-bottom: 25px;
    }
    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #ddd;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 4px;
      resize: vertical;
      background-color: #1a1a1a;
      color: #fff;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #444;
      border-radius: 4px;
      box-sizing: border-box;
      background-color: #1a1a1a;
      color: #fff;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #ddd;
    }
    .help-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    .save-btn {
      background-color: #4CAF50;
      color: white;
    }
    .save-btn:hover {
      background-color: #45a049;
    }
    .reset-btn {
      background-color: #f44336;
      color: white;
    }
    .reset-btn:hover {
      background-color: #da190b;
    }
    .button-group {
      margin-top: 20px;
    }
    .sync-status {
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
    }
    .sync-success {
      background-color: #2e7d32;
      color: #fff;
    }
    .sync-error {
      background-color: #c62828;
      color: #fff;
    }
    .sync-info {
      background-color: #1565c0;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>Page Blocker Settings</h1>
  
  <div class="section">
    <div class="section-title">Cloud Sync Settings</div>
    <div class="checkbox-container">
      <input type="checkbox" id="syncEnabled">
      <label for="syncEnabled" style="margin: 0;">Enable Cloud Sync</label>
    </div>
    <label for="cloudSyncUrl">Cloud Sync URL:</label>
    <input type="text" id="cloudSyncUrl" placeholder="https://example.com/blocklist.txt">
    <div class="help-text">Enter a URL to periodically download block patterns from.</div>
    
    <label for="syncInterval" style="margin-top: 15px;">Sync Interval (hours):</label>
    <input type="number" id="syncInterval" min="1" max="24" value="1">
    <div class="help-text">How often to sync with the cloud block list.</div>
    
    <button class="button sync-btn" id="syncNowBtn">Sync Now</button>
    <div class="sync-status sync-info" id="syncStatus" style="display: none;"></div>
  </div>
  
  <div class="section">
    <div class="section-title">Local Block List</div>
    <label for="blockList">Patterns (one per line):</label>
    <textarea id="blockList" placeholder="# Add your patterns here..."></textarea>
    <div class="help-text">
      Each line can contain a regular expression pattern.<br>
      Lines starting with # are comments.<br>
      Empty lines are ignored.
    </div>
  </div>
  
  <div class="button-group">
    <button class="button save-btn" id="saveBtn">Save Settings</button>
    <button class="button reset-btn" id="resetBtn">Reset to Defaults</button>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
